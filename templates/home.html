{% extends "base.html" %}
{% block title %}Heart Disease Prediction{% endblock %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #f8cdda 0%, #1d2b64 100%);
        font-family: "Poppins", sans-serif;
    }

    .prediction-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 100px 15px 40px;
        margin-top: -40px; /* moves slightly up */
    }

    .card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        background: #fff;
        padding: 30px 40px;
        transition: transform 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card-title {
        text-align: center;
        font-weight: 700;
        font-size: 45px;
        color: #e91e63;
        font-family: "Brush Script MT", cursive;
    }



    .text-muted {
        text-align: center;
        font-size: 16px;
        color: #6c757d !important;
    }

    label {
        font-weight: 500;
        color: #333;
    }

    .form-control, select.form-control {
        border-radius: 10px;
        border: 1px solid #ccc;
        transition: all 0.3s ease;
    }

    .form-control:focus, select.form-control:focus {
        border-color: #e91e63;
        box-shadow: 0 0 0 0.25rem rgba(233, 30, 99, 0.25);
    }

    .btn-primary {
        background: linear-gradient(90deg, #007bff, #e91e63);
        border: none;
        font-weight: 600;
        border-radius: 12px;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        background: linear-gradient(90deg, #e91e63, #007bff);
        transform: scale(1.05);
    }

    @media (max-width: 768px) {
        .col-md-6 {
            width: 100%;
        }
    }
</style>

<div class="prediction-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card">
                    <h1 class="card-title">Heart Disease Prediction</h1>
                    <p class="text-muted mb-4">
                        Enter the patient's data below to get a prediction result.
                    </p>
                    <hr>

                    <form action="/predict" method="post">
                        <div class="row">

                            <!-- Numeric Inputs -->
                            <div class="col-md-6 mb-3">
                                <label>Age</label>
                                <input type="number" class="form-control" name="age" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Resting Blood Pressure (trestbps)</label>
                                <input type="number" class="form-control" name="trestbps" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Cholesterol (chol)</label>
                                <input type="number" class="form-control" name="chol" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Max Heart Rate (thalach)</label>
                                <input type="number" class="form-control" name="thalach" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Oldpeak</label>
                                <input type="number" step="0.1" class="form-control" name="oldpeak" required>
                            </div>

                            <!-- Dropdown Inputs -->
                            <div class="col-md-6 mb-3">
                                <label>Sex</label>
                                <select class="form-control" name="sex" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - Female</option>
                                    <option value="1">1 - Male</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Chest Pain Type (cp)</label>
                                <select class="form-control" name="cp" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - Typical Angina</option>
                                    <option value="1">1 - Atypical Angina</option>
                                    <option value="2">2 - Non-Anginal Pain</option>
                                    <option value="3">3 - Asymptomatic</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Fasting Blood Sugar (fbs)</label>
                                <select class="form-control" name="fbs" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - False</option>
                                    <option value="1">1 - True</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Resting ECG (restecg)</label>
                                <select class="form-control" name="restecg" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - Normal</option>
                                    <option value="1">1 - ST-T Wave Abnormality</option>
                                    <option value="2">2 - Left Ventricular Hypertrophy</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Exercise Induced Angina (exang)</label>
                                <select class="form-control" name="exang" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - No</option>
                                    <option value="1">1 - Yes</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Slope (slope)</label>
                                <select class="form-control" name="slope" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - Upsloping</option>
                                    <option value="1">1 - Flat</option>
                                    <option value="2">2 - Downsloping</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Number of Major Vessels (ca)</label>
                                <select class="form-control" name="ca" required>
                                    <option value="">Select</option>
                                    <option value="0">0</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label>Thalassemia (thal)</label>
                                <select class="form-control" name="thal" required>
                                    <option value="">Select</option>
                                    <option value="0">0 - Unknown / Missing</option>
                                    <option value="1">1 - Fixed Defect</option>
                                    <option value="2">2 - Normal</option>
                                    <option value="3">3 - Reversible Defect</option>
                                </select>
                            </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Predict Result 🔎</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
