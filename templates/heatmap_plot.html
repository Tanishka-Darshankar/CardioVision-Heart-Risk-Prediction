{% extends "base.html" %}

{% block title %}Feature Heatmap{% endblock %}

{% block content %}
<style>
    /* Import the same elegant font as login page */
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

    body {
        background: linear-gradient(135deg, #f8cdda 0%, #1d2b64 100%);
        font-family: 'Quicksand', sans-serif;
        color: #333;
        min-height: 100vh;
        margin: 0;
        padding: 0;
    }

    .card {
        border: none;
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    }

    .card-title {
        font-weight: 700;
        font-size: 2rem;
        color: #d81b60; /* pink accent */
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        letter-spacing: 1px;
    }

    #plotly-plot {
        border-radius: 15px;
        overflow: hidden;
        background: #fff;
        padding: 10px;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
    }
</style>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card p-4">
                <h1 class="card-title text-center mb-4">Feature Correlation Heatmap 💫</h1>
                <div id="plotly-plot" class="mt-4">
                    {{ plot_html | safe }}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
